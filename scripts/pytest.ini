[pytest]
# pytest 配置文件

# 测试发现模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    stress: 压力测试
    security: 安全测试
    rag: 需要 llama_index 模块的 RAG 测试

# 最小 Python 版本
minversion = 7.0

# 测试路径
testpaths = tests

# 警告过滤
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 覆盖率配置
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=lib
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
