[pytest]
# pytest 配置文件

# 测试发现模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    integration: 集成测试（需要外部服务）
    slow: 慢速测试
    rag: 需要 llama_index 模块的 RAG 测试

# 最小 Python 版本
minversion = 7.0

# 测试路径
testpaths = tests

# 警告过滤
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
