name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Python lint
        working-directory: scripts
        run: ruff check .

      - name: Python type check
        working-directory: scripts
        run: pip install mypy types-requests types-pyyaml && mypy lib/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend lint + type check
        working-directory: scripts/web
        run: |
          npm ci
          npm run lint
          npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Python tests
        working-directory: scripts
        run: pytest tests/ -m "not slow" -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend tests
        working-directory: scripts/web
        run: |
          npm ci
          npm run test -- --run
